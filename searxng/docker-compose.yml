# Nexa Agent — 自建搜索后端 (SearXNG 元搜索)
# 目的：替代额度受限的 Tavily，提供零速率限制的本地搜索 JSON API
# 启动：cd searxng && docker compose up -d
# 验证：curl 'http://localhost:8888/search?q=deepseek&format=json'
services:
  searxng:
    image: searxng/searxng:latest
    container_name: nexa-searxng
    ports:
      # 仅绑定到 127.0.0.1 —— 私有实例，不对外暴露
      - "127.0.0.1:8888:8080"
    volumes:
      - ./config:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      # 实例名，便于在日志/UI 区分
      - INSTANCE_NAME=nexa-searxng
    restart: unless-stopped
    # 最小权限：去掉所有 capability，仅保留运行所需
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
